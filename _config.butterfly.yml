# Butterfly theme configuration for zzy's Little House.
# Theme docs: https://butterfly.js.org/

nav:
  logo:
  display_title: true
  display_post_title: true
  fixed: false

menu:
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  标签: /tags/ || fas fa-tags
  分类: /categories/ || fas fa-folder-open
  友链: /link/ || fas fa-link
  音乐: /music/ || fas fa-music
  关于: /about/ || fas fa-heart

social:
  fab fa-github: https://github.com/zzy1026zzy || Github || '#24292e'

favicon: /img/favicon.ico

avatar:
  img: /img/touxiang.png
  effect: false

disable_top_img: false
default_top_img: /img/wangye.png
index_img: /img/wangye.png
archive_img: /img/wangye.png
tag_img: /img/wangye.png
category_img: /img/wangye.png
footer_img: /img/wangye.png
background: '#f6f8fa'

cover:
  index_enable: true
  aside_enable: true
  archives_enable: true
  default_cover:
    - /img/car.png
    - /img/fenni.png
    - /img/punk.png

error_img:
  flink: /img/friend_404.gif
  post_page: /img/404.jpg

error_404:
  enable: true
  subtitle: '页面走丢了'
  background: /img/error-page.png

subtitle:
  enable: true
  effect: true
  source: false
  sub:
    - 记录学习、代码和生活
    - Talk is cheap. Show me the code.

index_layout: 3
index_post_content:
  method: 3
  length: 260

code_blocks:
  theme: light
  macStyle: true
  height_limit: false
  word_wrap: false
  copy: true
  language: true
  shrink: false
  fullpage: false

toc:
  post: true
  page: true
  number: true
  expand: false
  style_simple: false
  scroll_percent: true

post_meta:
  page:
    date_type: created
    date_format: date
    categories: true
    tags: false
    label: true
  post:
    position: left
    date_type: both
    date_format: date
    categories: true
    tags: true
    label: true

post_copyright:
  enable: true
  decode: false
  author_href: https://github.com/zzy1026zzy
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

related_post:
  enable: true
  limit: 6
  date_type: created

post_pagination: 1

noticeOutdate:
  enable: true
  style: flat
  limit_day: 365
  position: top
  message_prev: 距离上次更新已经
  message_next: 天，部分内容可能需要重新确认。

footer:
  owner:
    enable: true
    since: 2026
  copyright:
    enable: true
    version: true
  custom_text: 'Powered by Hexo & Butterfly'

aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right
  display:
    archive: true
    tag: true
    category: true
  card_author:
    enable: true
    description: 记录学习、代码和生活
    button:
      enable: true
      icon: fab fa-github
      text: Follow Me
      link: https://github.com/zzy1026zzy
  card_announcement:
    enable: true
    content: 欢迎来到我的博客。
  card_recent_post:
    enable: true
    limit: 5
    sort: date
  card_categories:
    enable: true
    limit: 8
    expand: none
  card_tags:
    enable: true
    limit: 40
    color: false
    orderby: random
    order: 1
  card_archives:
    enable: true
    type: monthly
    format: MMMM YYYY
    order: -1
    limit: 8
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true
    runtime_date: 06/18/2026 00:00:00

darkmode:
  enable: true
  button: true
  autoChangeMode: false

readmode: true
rightside_scroll_percent: true

copy:
  enable: true
  copyright:
    enable: true
    limit_count: 150

wordcount:
  enable: false
  post_wordcount: true
  min2read: true
  total_wordcount: true

busuanzi:
  site_uv: true
  site_pv: true
  page_pv: true

math:
  use: mathjax
  per_page: true
  hide_scrollbar: false
  mathjax:
    enableMenu: true
    tags: none

search:
  use:
  placeholder: 搜索文章
  local_search:
    preload: false
    top_n_per_article: 1
    unescape: false
    pagination:
      enable: false
      hitsPerPage: 8

share:
  use: sharejs
  sharejs:
    sites: wechat,weibo,qq

comments:
  use:
  text: true
  lazyload: false
  count: false
  card_post_count: false

theme_color:
  enable: true
  main: '#49B1F5'
  paginator: '#00c4b6'
  button_hover: '#FF7242'
  text_selection: '#00c4b6'
  link_color: '#49B1F5'
  meta_color: '#858585'
  hr_color: '#A4D8FA'
  code_foreground: '#F47466'
  code_background: 'rgba(27, 31, 35, .05)'
  toc_color: '#00c4b6'
  blockquote_padding_color: '#49b1f5'
  blockquote_background_color: 'rgba(73, 177, 245, .1)'
  scrollbar_color: '#49b1f5'
  meta_theme_color_light: 'ffffff'
  meta_theme_color_dark: '#0d0d0d'

rounded_corners_ui: true
text_align_justify: false

mask:
  header: true
  footer: true

preloader:
  enable: true
  source: 2
  pace_css_url: https://cdn.jsdelivr.net/npm/pace-js/themes/blue/pace-theme-minimal.min.css

enter_transitions: true
display_mode: light

beautify:
  enable: true
  field: post
  title_prefix_icon: '\f0c1'
  title_prefix_icon_color: '#49B1F5'

font:
  global_font_size:
  code_font_size:
  font_family:
  code_font_family:

canvas_nest:
  enable: true
  color: '0,0,255'
  opacity: 0.5
  zIndex: -1
  count: 80
  mobile: false

activate_power_mode:
  enable: true
  colorful: true
  shake: false
  mobile: false

fireworks:
  enable: false
  zIndex: 9999
  mobile: false

click_heart:
  enable: true
  mobile: false

lightbox: fancybox

note:
  style: flat
  icons: true
  border_radius: 3
  light_bg_offset: 0

mermaid:
  enable: true
  code_write: false
  theme:
    light: default
    dark: dark
  open_in_new_tab: true
  zoom_pan: true

pjax:
  enable: true
  exclude:
    - /music/

aplayerInject:
  enable: false
  per_page: true

snackbar:
  enable: true
  position: top-right
  bg_light: '#49b1f5'
  bg_dark: '#1f1f1f'

instantpage: true

lazyload:
  enable: true
  native: false
  field: site
  placeholder:
  blur: true

Open_Graph_meta:
  enable: true

css_prefix: true

inject:
  head:
    - <link rel="stylesheet" href="/css/custom.css">
  bottom:

CDN:
  internal_provider: local
  third_party_provider: jsdelivr
  version: true
